services:
  # ============================================
  # HOME ASSISTANT
  # Smart home automation platform
  # Uses host network for device discovery (mDNS, Bluetooth)
  # ============================================
  homeassistant:
    container_name: homeassistant
    image: ghcr.io/home-assistant/home-assistant:stable
    restart: unless-stopped
    privileged: true
    network_mode: host
    environment:
      - TZ=${TZ}
    volumes:
      - ${HA_CONFIG_PATH}:/config

  # ============================================
  # PI-HOLE
  # Network-wide ad blocking via DNS
  # Web UI on port 8080, DNS on port 53
  # ============================================
  pihole:
    container_name: pihole
    image: pihole/pihole:latest
    restart: unless-stopped
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "8080:80/tcp"
    environment:
      - TZ=${TZ}
      - WEBPASSWORD=${PIHOLE_PASSWORD}
      - FTLCONF_dns_listeningMode=all
      - FTLCONF_dns_upstreams=1.1.1.1;1.0.0.1
      - ServerIP=${LAN_IP}
    volumes:
      - ./pihole/etc-pihole:/etc/pihole
      - ./pihole/etc-dnsmasq.d:/etc/dnsmasq.d
    networks:
      homelab:
        ipv4_address: 172.20.0.53
    dns:
      - 127.0.0.1
      - 1.1.1.1
    cap_add:
      - NET_ADMIN

  # ============================================
  # PORTAINER
  # Docker container management UI
  # ============================================
  portainer:
    container_name: portainer
    image: portainer/portainer-ce:latest
    restart: unless-stopped
    ports:
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./portainer:/data
    networks:
      - homelab

  # ============================================
  # CADDY
  # Reverse proxy for *.home.local domains
  # ============================================
  caddy:
    container_name: caddy
    image: caddy:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - ./caddy/data:/data
      - ./caddy/config:/config
    networks:
      - homelab
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ============================================
  # UPTIME KUMA
  # Service monitoring and status page
  # ============================================
  uptime-kuma:
    container_name: uptime-kuma
    image: louislam/uptime-kuma:latest
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - ./uptime-kuma:/app/data
    networks:
      - homelab

  # ============================================
  # HOMEPAGE
  # Dashboard for all services
  # ============================================
  homepage:
    container_name: homepage
    image: ghcr.io/gethomepage/homepage:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./homepage/config:/app/config
    networks:
      - homelab

  # ============================================
  # CLOUDFLARED (Optional)
  # Cloudflare Tunnel for external access
  # Start with: docker compose --profile tunnel up -d
  # ============================================
  cloudflared:
    container_name: cloudflared
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate --protocol auto --edge-ip-version auto --url http://caddy:80
    environment:
      - TUNNEL_METRICS=0.0.0.0:9126
    networks:
      - homelab
    depends_on:
      - caddy
    profiles:
      - tunnel

networks:
  homelab:
    name: homelab
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
